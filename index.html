<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Collections - July</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    /* ===== Toretto Library tokens (Tabs production design system) ===== */
    /* General */
    --white:#ffffff; --black:#1c1c1a; --cream:#fefff9; --snow:#fcfcfc;
    /* Warm neutrals (cloud / warm-grey) */
    --n50:#f3f3f2; --n100:#e7e8e6; --n200:#d3d4d0; --n300:#b8bab4;
    --n400:#93968c; --n500:#75786f; --n600:#686a62; --n700:#52554e; --n800:#464742; --n900:#2d2e2b; --n950:#1c1c1a;
    /* Brand: "jolly" blue accent + ink */
    --primary:#1c1c1a; --secondary:#2476d8;
    --hi-50:#edf5fe; --hi-100:#4d97f0; --hi-200:#2476d8; --hi-300:#164782; --hi-400:#12395f;
    /* Alternative */
    --plum:#8652ff; --zest:#15ac3f;
    /* Semantic (Toretto shades) */
    --positive:#15ac3f; --positive-surface:#e9f7ed;
    --warning:#a94f1b; --warning-surface:#fee3d4;
    --critical:#e52834; --critical-surface:#fef0f1;
    --info:#2476d8; --info-surface:#edf5fe;
    --draft:#164782; --insight:#8652ff;
    /* Border */
    --border:#d3d4d0; --selected-border:#1c1c1a;
    /* Toretto-specific surfaces */
    --header:#d3d6c2; --tertiary:#d3d6c2; --tertiary-hover:#b8bab4; --sand:#9f9276; --moss-500:#5c6b47;

    /* ===== Semantic aliases consumed by the prototype (now resolve to Toretto tokens) ===== */
    --nav:#2d2e2b; --nav2:#1c1c1a; --nav-ink:#f4f5f0; --nav-hi:var(--white); --nav-sub:#93968c; --nav-hover:#464742; --nav-active:#52554e;
    --ink:var(--primary); --helper:var(--n500); --line:var(--border); --line2:var(--n100);
    --bg:var(--white); --soft:var(--n50); --blue:var(--hi-200); --good:var(--positive); --warn:var(--critical);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;
    -webkit-font-smoothing:antialiased;}
  .app{display:flex;min-height:100vh;}
  svg{display:block;}

  /* ===== AGENT CHAT — left drawer (pushes nav + content right) ===== */
  .chat-drawer{flex:0 0 0;width:0;overflow:hidden;background:var(--white);color:var(--ink);transition:flex-basis .22s ease,width .22s ease;}
  .app.chat-open .chat-drawer{flex:0 0 364px;width:364px;border-right:1px solid var(--line);}
  .chat-inner{width:364px;height:100vh;position:sticky;top:0;display:flex;flex-direction:column;}
  .chat-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);}
  .chat-head-icon{width:30px;height:30px;flex:0 0 30px;background:var(--nav);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .chat-head-icon svg{width:17px;height:17px;}
  .chat-head-title{font-size:15px;font-weight:700;flex:1;}
  .chat-close{width:28px;height:28px;border:none;background:transparent;color:var(--n500);font-size:21px;line-height:1;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;}
  .chat-close:hover{background:var(--n100);color:var(--ink);}
  .chat-body{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:12px;}
  /* hero / empty state */
  .chat-hero{margin:auto 0;text-align:center;padding:10px 4px;}
  .chat-hero-icon{width:52px;height:52px;margin:0 auto 14px;background:var(--nav);border:none;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;}
  .chat-hero-icon svg{width:26px;height:26px;}
  .chat-hero h3{font-size:18px;font-weight:700;margin:0 0 8px;color:var(--ink);}
  .chat-hero p{font-size:13px;color:var(--helper);line-height:1.55;margin:0;}
  /* messages */
  .chat-msg{max-width:86%;font-size:13.5px;line-height:1.5;padding:9px 12px;border-radius:8px;}
  .chat-msg.user{align-self:flex-end;background:#0f5a5f;color:#fff;border-bottom-right-radius:4px;}
  .chat-msg.agent{align-self:flex-start;background:var(--n100);color:var(--ink);border-bottom-left-radius:4px;}
  .chat-foot{padding:12px 14px 14px;border-top:1px solid var(--line);}
  .chat-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
  .chat-chip{font-size:12px;color:var(--ink);border:1px solid var(--tertiary);border-radius:6px;padding:5px 11px;cursor:pointer;background:var(--white);transition:background-color .12s ease,border-color .12s ease;}
  .chat-chip:hover{background:#e7e9de;border-color:#e7e9de;color:var(--ink);}
  .chat-input-wrap{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:9px 11px;display:flex;align-items:flex-end;gap:8px;}
  .chat-input{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font-size:13.5px;font-family:inherit;resize:none;line-height:1.5;min-height:22px;max-height:120px;}
  .chat-input::placeholder{color:var(--n400);}
  .chat-send{width:30px;height:30px;flex:0 0 30px;border-radius:50%;background:#0f5a5f;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;}
  .chat-send svg{width:15px;height:15px;}
  /* "Ask agent" clip — attached to the sidebar's right edge; opens the chat */
  .agent-clip{position:fixed;top:50vh;left:228px;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;align-items:center;gap:9px;background:var(--tertiary);color:var(--ink);border-radius:0 11px 11px 0;padding:16px 7px;cursor:pointer;box-shadow:3px 0 12px rgba(0,0,0,.16);transition:left .2s ease,opacity .18s ease,filter .12s ease;}
  .agent-clip:hover{filter:brightness(1.06);}
  .agent-clip .ac-icon{display:flex;}
  .agent-clip .ac-icon svg{width:16px;height:16px;}
  .agent-clip .ac-label{writing-mode:vertical-rl;transform:rotate(180deg);font-size:12.5px;font-weight:700;letter-spacing:.3px;white-space:nowrap;}
  .app.rail-collapsed .agent-clip{left:74px;}
  .app.chat-open .agent-clip{opacity:0;pointer-events:none;}

  /* ===== LEFT NAV ===== */
  .rail{width:228px;flex:0 0 228px;background:var(--nav);display:flex;flex-direction:column;padding:0;transition:width .18s ease,flex-basis .18s ease;position:sticky;top:0;align-self:flex-start;height:100vh;}
  .rail.collapsed{width:74px;flex:0 0 74px;}
  /* header */
  .rail .brand{padding:16px 14px 2px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .rail .brand .logo{display:inline-flex;align-items:center;}
  .rail .brand .logo-svg{height:24px;width:auto;display:block;fill:#fff;}
  .rail .brand .logo-spark{fill:#fff;transition:fill .15s ease;}
  .rail .brand:hover .logo-spark{fill:var(--secondary);}
  .rail .rail-fav{display:none;}
  .rail .nav-collapse{width:26px;height:26px;flex:0 0 26px;display:flex;align-items:center;justify-content:center;color:var(--nav-sub);cursor:pointer;border-radius:6px;}
  .rail .nav-collapse svg{width:16px;height:16px;}
  .rail .nav-collapse:hover{background:rgba(255,255,255,.08);color:#fff;}
  .rail .brand-sub{padding:3px 16px 12px;margin-bottom:6px;font-size:13px;color:var(--nav-sub);border-bottom:1px solid var(--n700);}
  /* collapsed: Slack-style — Tabs favicon on top, toggle below */
  .rail.collapsed .brand{flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:16px 0 12px;border-bottom:1px solid var(--n700);}
  .rail.collapsed .brand .logo{display:none;}
  .rail.collapsed .brand-sub{display:none;}
  .rail.collapsed .rail-fav{display:flex;align-items:center;justify-content:center;width:28px;height:28px;}
  .rail.collapsed .rail-fav svg{width:20px;height:20px;fill:#fff;}
  /* nav lists */
  .rail nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:2px 0;}
  .nav-item{display:flex;align-items:center;gap:11px;min-height:36px;padding:6px 12px;margin:0;border-radius:0;color:var(--nav-ink);font-size:13.5px;cursor:pointer;user-select:none;white-space:nowrap;}
  .nav-item .ni-ic{width:17px;height:17px;flex:0 0 17px;opacity:.92;}
  .nav-item .ni-label{flex:1;overflow:hidden;text-overflow:ellipsis;}
  .nav-item .ni-chev{width:13px;height:13px;flex:0 0 13px;color:var(--nav-sub);transition:transform .15s ease;transform:rotate(-90deg);}
  .nav-item .ni-chev.open{transform:rotate(0deg);}
  .nav-item .ni-trail{width:15px;height:15px;flex:0 0 15px;color:var(--nav-sub);}
  .nav-item .ni-ic-agent{color:inherit;opacity:.92;}
  .nav-item:hover{background:var(--nav-hover);}
  .nav-item.active{background:var(--nav-active);color:#fff;}
  /* expanded section sits on a slightly lighter navy band — Highlights 400 #001E2D */
  .nav-group.open{background:var(--nav2);border-radius:0;padding:2px 0;margin:0;}
  .rail.collapsed .nav-group.open{background:none;padding:0;margin:0;}
  .nav-sub{position:relative;display:flex;align-items:center;min-height:32px;padding:6px 12px 6px 42px;margin:0;border-radius:0;color:#c3c6bc;font-size:12.5px;cursor:pointer;white-space:nowrap;}
  .nav-sub:hover{background:var(--nav-hover);color:#fff;}
  /* selected sub-item: inline teal dot at the label-start, bold label pushed right, no fill */
  .nav-sub.active{color:#fff;font-weight:500;background:var(--nav-active);}
  .nav-sub.active:hover{background:var(--nav-active);}
  /* review-count badge sits at the row's right edge */
  .nav-sub .nav-badge{margin-left:auto;}
  /* footer */
  .rail .foot{padding:6px 8px 10px;margin-top:auto;border-top:1px solid var(--n700);}
  /* collapsed: simple icon-only rail (no labels), square hover/active */
  .rail.collapsed nav{padding:6px 0;}
  .rail.collapsed .foot{padding:8px 0 10px;}
  .rail.collapsed .nav-item{flex-direction:row;justify-content:center;gap:0;padding:10px 0;margin:0;}
  .rail.collapsed .nav-item:hover{background:var(--nav-hover);}
  .rail.collapsed .nav-item.active{background:var(--nav-active);color:#fff;}
  .rail.collapsed .ni-ic{width:19px;height:19px;flex:0 0 19px;border-radius:0;display:flex;align-items:center;justify-content:center;opacity:.92;background:none;}
  .rail.collapsed .ni-ic svg{width:19px;height:19px;}
  .rail.collapsed .ni-label{display:none;}
  .rail.collapsed .ni-chev,.rail.collapsed .ni-trail,.rail.collapsed .nav-sub{display:none;}
  .rail.collapsed .nav-item > .nav-badge{display:none;}
  .rail.collapsed .foot .nav-item{padding:9px 0;}
  /* notification dot on a collapsed parent (Invoicing → Collections reviews) */
  .ni-dot{display:none;}
  .rail.collapsed .ni-dot{display:block;position:absolute;top:5px;right:16px;width:8px;height:8px;border-radius:50%;background:var(--critical);border:2px solid var(--nav);}

  /* ===== MAIN ===== */
  .main{flex:1;min-width:760px;display:flex;flex-direction:column;padding-left:18px;}
  /* keep the breadcrumb + its divider full-width despite the content safe-gutter */
  .crumb{margin-left:-18px;}
  /* Geist Mono for section eyebrow labels (What happened, Outstanding invoices, Agent summary…) */
  .as-label,.inv-h,.ce-h,.stat-toplabel,.ev-label,.wh-label,.bridge-label,.tl-h{font-family:"Geist Mono",ui-monospace,SFMono-Regular,monospace;font-weight:500;}

  /* crumb */
  .crumb{display:flex;align-items:center;gap:8px;padding:11px 22px;border-bottom:1px solid var(--line);font-size:13px;color:var(--helper);}
  .crumb b{color:var(--ink);font-weight:600;}
  .crumb .back{color:var(--blue);cursor:pointer;font-size:13px;margin-right:4px;}
  .crumb .sp{flex:1;}

  /* ===== SCHEDULED TAB ===== */
  .sched-body{max-width:1000px;}
  .sched-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .sched-header h3{font-size:15px;font-weight:700;margin:0;}
  .sched-settings-link{font-size:12.5px;color:var(--helper);cursor:pointer;text-decoration:underline;}
  .sched-tile{border:1px solid var(--line);border-radius:8px;margin-bottom:12px;overflow:hidden;}
  .sched-tile-head{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 16px 10px;}
  .sched-tile-left{flex:1;min-width:0;}
  .sched-tile-when{font-size:11.5px;color:var(--helper);margin-bottom:4px;}
  .sched-tile-title{font-size:14px;font-weight:700;}
  .sched-tile-sub{font-size:12.5px;color:var(--helper);margin-top:3px;}
  .sched-tile-body{padding:0 16px 13px;font-size:13px;color:var(--helper);line-height:1.45;}
  .sched-tile-foot{padding:8px 16px;border-top:1px solid var(--line2);display:flex;align-items:center;gap:10px;background:var(--soft);}
  .sched-tile-foot .sf-note{font-size:12px;color:var(--helper);flex:1;}
  /* dunning tile: read-only feel */
  .sched-tile.dunning{background:#fafaf9;}
  /* agent task tile: editable */
  .sched-task-form{padding:12px 16px;border-top:1px solid var(--line2);}
  .stf-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;font-size:13px;}
  .stf-label{flex:0 0 72px;color:var(--helper);font-size:12px;font-weight:600;}
  .stf-input{flex:1;border:1px solid var(--line);border-radius:6px;padding:6px 9px;font-size:13px;font-family:inherit;outline:none;}
  .stf-input:focus{border-color:var(--blue);}
  .stf-textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:8px 9px;font-size:13px;font-family:inherit;line-height:1.5;resize:vertical;min-height:80px;outline:none;}
  .stf-textarea:focus{border-color:var(--blue);}
  .stf-actions{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
  .stf-tiny{display:flex;gap:12px;font-size:12px;color:var(--helper);}
  .stf-tiny span{cursor:pointer;} .stf-tiny span:hover{color:var(--ink);}
  .stf-delete{font-size:12px;color:var(--warn);cursor:pointer;}
  .stf-delete:hover{text-decoration:underline;}

  /* ===== BILLING / INVOICE PAGE ===== */
  .inv-page{padding:0 32px 48px;}
  .inv-page-notice{font-size:13px;color:var(--helper);padding:10px 0;border-bottom:1px solid var(--line);margin-bottom:20px;}
  .inv-page-notice strong{color:var(--ink);}
  .inv-page-title{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
  .inv-page-title h1{font-size:30px;font-weight:500;margin:0;letter-spacing:-.01em;}
  .inv-status-chip{font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px;border:1px solid var(--line);color:var(--helper);}
  .inv-status-chip.overdue{border-color:var(--warning);color:var(--warning);background:var(--warning-surface);}
  .inv-page-id{font-size:12.5px;color:var(--helper);margin-bottom:16px;}
  .inv-page-actions{display:flex;gap:8px;margin-left:auto;}
  .inv-section{background:#fff;border:1px solid var(--line);border-radius:8px;padding:22px 24px;margin-bottom:20px;}
  .inv-section h2{font-size:16px;font-weight:700;margin:0 0 18px;}
  .inv-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 40px;}
  .inv-field{display:grid;grid-template-columns:140px 1fr;gap:4px 12px;padding:6px 0;border-bottom:1px solid var(--line2);align-items:baseline;}
  .inv-field:last-child{border-bottom:none;}
  .inv-field .if-label{font-size:13px;color:var(--helper);}
  .inv-field .if-val{font-size:13px;color:var(--ink);}
  .inv-field .if-val a{color:var(--blue);text-decoration:none;}
  .inv-divider{width:1px;background:var(--line);margin:0 20px;}
  /* line items table */
  .inv-items-table{width:100%;border-collapse:collapse;font-size:13px;}
  .inv-items-table th{text-align:left;padding:8px 0;border-bottom:2px solid var(--line);font-size:12px;font-weight:700;color:var(--helper);}
  .inv-items-table th.r,.inv-items-table td.r{text-align:right;}
  .inv-items-table td{padding:12px 0;border-bottom:1px solid var(--line2);vertical-align:top;}
  .inv-items-table tr:last-child td{border-bottom:none;}
  .inv-totals{margin-top:16px;display:grid;grid-template-columns:1fr auto;gap:4px 24px;font-size:13px;max-width:360px;margin-left:auto;}
  .inv-totals .it-label{color:var(--helper);text-align:right;}
  .inv-totals .it-val{text-align:right;}
  .inv-totals .it-total{font-weight:700;color:var(--ink);}

  /* ===== CUSTOMER PAGE ===== */
  .cust-page{padding:28px 32px;}
  .cust-title{font-size:26px;font-weight:700;margin:0 0 6px;}
  .cust-meta{font-size:12px;color:var(--helper);letter-spacing:.3px;margin-bottom:28px;}
  .cust-meta a{color:var(--helper);text-decoration:underline;cursor:pointer;}
  .cust-section{background:#f6f6f3;border-radius:8px;padding:22px 24px;margin-bottom:20px;}
  .cust-section-title{font-size:14px;color:var(--helper);margin-bottom:18px;}
  .cust-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
  .cust-link{padding:12px 0;border-bottom:1px solid var(--line2);}
  .cust-grid .cust-link:nth-last-child(-n+2){border-bottom:none;}
  .cust-grid .cust-link:nth-child(odd){padding-right:32px;border-right:1px solid var(--line2);}
  .cust-grid .cust-link:nth-child(even){padding-left:32px;}
  .cust-link a,.cust-link .cl-title{font-size:14px;font-weight:500;text-decoration:underline;color:var(--ink);cursor:pointer;display:inline-block;}
  .cust-link a:hover,.cust-link .cl-title:hover{opacity:.7;}
  .cust-link .cl-title.agent{font-weight:600;}
  .cust-link p{margin:4px 0 0;font-size:13px;color:var(--helper);}

  /* ===== INBOX VIEW ===== */
  .inbox-wrap{padding:24px 28px;}
  .inbox-head{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
  .inbox-head h1{margin:0;}
  .filter-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px;}
  .filter-row .sp{flex:1;}
  /* search — collapsed by default, expands on focus so you can type longer queries */
  .inbox-search{position:relative;display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:8px;padding:0 10px;background:#fff;height:38px;width:210px;transition:width .24s cubic-bezier(.4,0,.2,1),border-color .12s ease;}
  /* expand on focus AND whenever it has text — the has-text case means a keystroke re-render
     recreates the box already at full width, so it doesn't replay the 210→340 animation each letter. */
  .inbox-search:focus-within,.inbox-search.has-text{width:340px;}
  .inbox-search:focus-within{border-color:var(--hi-200);}
  .inbox-search .is-icon{display:flex;align-items:center;color:var(--n500);flex:0 0 auto;}
  .inbox-search .is-icon svg{width:15px;height:15px;}
  .inbox-search input{border:none;outline:none;font-size:13px;font-family:inherit;flex:1;min-width:0;color:var(--ink);background:transparent;height:100%;}
  .inbox-search input::placeholder{color:var(--n400);}
  .inbox-search .is-clear{display:flex;align-items:center;justify-content:center;border:none;background:transparent;padding:0;cursor:pointer;color:var(--n300);flex:0 0 auto;opacity:0;pointer-events:none;transition:opacity .12s ease,color .12s ease;}
  .inbox-search .is-clear svg{width:16px;height:16px;}
  .inbox-search .is-clear:hover{color:var(--n400);}
  .inbox-search.has-text .is-clear{opacity:1;pointer-events:auto;}
  .filter-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--tertiary);border-radius:6px;padding:8px 16px;font-size:13.5px;cursor:pointer;background:var(--tertiary);color:var(--ink);font-weight:500;}
  .filter-btn:hover{background:var(--tertiary-hover);border-color:var(--tertiary-hover);}
  .filter-btn svg{width:14px;height:14px;}
  .filter-chip{display:inline-flex;align-items:center;gap:6px;background:var(--hi-50);border-radius:6px;padding:6px 6px 6px 11px;font-size:13px;color:var(--ink);}
  .filter-chip b{font-weight:600;}
  .filter-chip .fc-x{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;color:var(--n500);cursor:pointer;font-size:14px;}
  .filter-chip .fc-x:hover{background:var(--hi-100);color:var(--ink);}
  .filter-dropdown{position:absolute;z-index:30;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.12);padding:6px 0;min-width:240px;margin-top:4px;}
  .filter-option{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;font-size:13.5px;cursor:pointer;color:var(--ink);}
  .filter-option:hover{background:var(--soft);}
  .filter-option.active{background:var(--soft);font-weight:600;}
  .filter-option .fo-chev{color:var(--helper);font-size:12px;}
  /* dimension list (left) + value panel (right) shown side by side, not step-through */
  .filter-dims-panel{width:240px;}
  .filter-values-panel{left:248px;min-width:230px;padding:14px 16px;}
  .filter-checkbox-row,.filter-radio-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13.5px;color:var(--ink);cursor:pointer;}
  .filter-checkbox-row input,.filter-radio-row input{width:16px;height:16px;accent-color:var(--hi-200);cursor:pointer;flex:0 0 auto;}
  .fn-row{display:flex;gap:16px;align-items:flex-start;}
  .fn-radios{display:flex;flex-direction:column;}
  .fn-amount{display:flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:2px;flex:0 0 auto;}
  .fn-amount .fa-prefix{color:var(--helper);font-size:13.5px;}
  .filter-amount-input{border:none;outline:none;width:76px;font-size:13.5px;font-family:inherit;color:var(--ink);background:transparent;}
  .fa-clear{display:flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--n200);color:#fff;border:none;cursor:pointer;font-size:11px;line-height:1;flex:0 0 auto;}
  .filter-reset-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:12px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:var(--soft);color:var(--helper);font-size:13px;font-weight:500;cursor:pointer;}
  .filter-reset-btn:hover{color:var(--ink);}
  .filter-reset-btn svg{width:14px;height:14px;}
  .inbox-head h1{font-size:30px;font-weight:500;margin:0;letter-spacing:-.01em;}
  /* shared page headline (Toretto: font-sans font-medium text-3xl) */
  .page-title{font-family:'Inter',ui-sans-serif,sans-serif;font-size:30px;font-weight:500;line-height:1.15;letter-spacing:-.01em;margin:0;}
  @media (max-width:900px){.page-title,.inbox-head h1,.inv-page-title h1{font-size:24px;}}
  /* inbox table */
  .stat-link{display:inline-block;margin-top:10px;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;}
  .stat-link:hover{text-decoration:underline;}
  .stat-dot-tr{position:absolute;top:14px;right:16px;}
  /* nav badge (number) */
  .nav-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:6px;background:var(--critical);color:#fff;font-size:10px;font-weight:500;padding:0 5px;margin-left:auto;line-height:1;}
  .inbox-table-wrap{border:1px solid var(--n100);border-radius:6px;overflow-x:auto;overflow-y:hidden;background:var(--white);}
  .inbox-table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .inbox-table thead th{text-align:left;padding:8px 12px;background:var(--n50);border-bottom:1px solid var(--n100);font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;user-select:none;}
  .inbox-table thead th.r{text-align:right;}
  .inbox-table thead th.sortable{cursor:pointer;}
  .inbox-table thead th.sortable:hover{color:var(--ink);}
  .inbox-table thead th.sorted{color:var(--ink);}
  .inbox-table thead th.sorted .th-sort{color:var(--hi-200);}
  .th-sort{margin-left:5px;color:var(--n400);font-size:10px;vertical-align:middle;}
  .inbox-table tbody tr{height:72px;border-bottom:1px solid var(--n100);transition:background .1s ease;}
  .inbox-table tbody tr:last-child{border-bottom:none;}
  .inbox-table tbody tr.clickable{cursor:pointer;}
  .inbox-table tbody tr.clickable:hover{background:var(--n50);}
  .inbox-table tbody tr.row-inert{cursor:default;}
  .inbox-table tbody td{padding:13px 14px;vertical-align:top;overflow:hidden;}
  .inbox-table tbody td.r{text-align:right;}
  /* Rows are a fixed height — "What happened" clamps to 2 lines and Agent actions caps at
     2 single-line bullets (all current data fits both), so nothing pushes a row taller. */
  .inbox-table .event-text{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .filter-chips{display:inline-flex;align-items:center;gap:8px;}
  .pagination-row{display:flex;align-items:center;justify-content:space-between;padding:12px 2px 0;font-size:12.5px;color:var(--helper);}
  .pagination-controls{display:flex;align-items:center;gap:6px;}
  .btn-page-arrow{display:flex;align-items:center;justify-content:center;width:26px;height:26px;padding:0;border:none;background:transparent;border-radius:6px;color:var(--n500);cursor:pointer;}
  .btn-page-arrow svg{width:16px;height:16px;}
  .btn-page-arrow:hover:not(:disabled){background:var(--soft);color:var(--ink);}
  .btn-page-arrow:disabled{color:var(--n300);cursor:default;opacity:.5;}
  .pg-num{width:26px;height:26px;padding:0;font-family:"Geist Mono",ui-monospace,monospace;font-size:12px;font-weight:500;color:var(--n500);background:transparent;border:1px solid transparent;border-radius:6px;cursor:pointer;}
  .pg-num:hover{color:var(--ink);}
  .pg-num.active{color:var(--ink);border-color:var(--ink);cursor:default;}
  .pg-ellipsis{color:var(--n400);padding:0 2px;font-size:12px;}
  .cust-name{font-weight:600;color:var(--ink);}
  .cell-amt{font-weight:600;color:var(--ink);}
  .inv-tag{display:inline-block;font-size:11.5px;background:var(--n50);border:1px solid var(--border);border-radius:5px;padding:2px 7px;color:var(--n600);margin:0 3px 3px 0;}
  .overdue-amt{font-weight:700;color:var(--warn);}
  .evt-tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;background:var(--info-surface);border-radius:5px;padding:2px 7px;color:var(--info);margin-right:3px;margin-bottom:2px;font-weight:600;}
  /* status — understated pill on a Balance semantic surface */
  .plan-chip{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.2px;white-space:nowrap;}
  .plan-chip.review{background:var(--warning-surface);color:var(--warning);}
  .plan-chip.executed{background:var(--positive-surface);color:var(--positive);}
  .plan-chip.rejected{background:var(--n100);color:var(--n600);}
  .plan-chip.failed{background:var(--critical-surface);color:var(--critical);}
  .paused-chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--n100);color:var(--n600);margin-left:8px;vertical-align:middle;text-transform:uppercase;letter-spacing:.3px;}
  .act-bullets{margin:0;padding-left:15px;}
  .act-bullets li{font-size:12.5px;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .act-bullets li::marker{color:var(--n400);}
  .inbox-head .sp{flex:1;}
  .age-num{font-size:13px;color:var(--helper);}

  /* ===== DETAIL VIEW ===== */
  /* fingerprint header */
  .finger{display:flex;gap:28px;padding:18px 22px 14px;}
  .finger .left{flex:1;min-width:0;}
  .finger .right{flex:0 0 440px;padding:16px 0 0;}
  .rel-row{margin-bottom:10px;}
  .rel-row .t{font-size:14px;font-weight:700;}
  .inv-h{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--moss-500);font-weight:700;margin-bottom:6px;}
  .inv-table-wrap{border:1px solid var(--n100);border-radius:6px;overflow:hidden;}
  table.inv{width:100%;border-collapse:collapse;font-size:13px;}
  table.inv thead th{text-align:left;font-weight:500;color:var(--ink);padding:8px 10px;background:var(--n50);border-bottom:1px solid var(--n100);}
  table.inv th.r,table.inv td.r{text-align:right;}
  table.inv th.inv-sortable{cursor:pointer;user-select:none;}
  table.inv th.inv-sortable:hover{text-decoration:underline;}
  table.inv th.inv-sortable.sorted{color:var(--ink);}
  .inv-sort-ic{display:inline-flex;width:13px;height:13px;vertical-align:-2px;margin-left:3px;opacity:.55;}
  table.inv th.inv-sortable.sorted .inv-sort-ic{opacity:1;}
  table.inv tbody tr{border-bottom:1px solid var(--n100);}
  table.inv tbody tr:last-child{border-bottom:none;}
  table.inv tbody tr:hover{background:var(--n50);}
  table.inv td{padding:8px 10px;color:var(--ink);vertical-align:top;}
  .due-chip{display:inline-block;font-size:11px;font-weight:600;padding:1px 7px;border-radius:8px;margin-left:6px;}
  .due-chip.over{background:#f4dcd3;color:#a23a1e;}
  .due-chip.soon{background:#e9eae6;color:#5a5c54;}
  .paybar{height:4px;width:90px;background:#e6e6e2;border-radius:3px;margin:4px 0 0 auto;overflow:hidden;}
  .paybar i{display:block;height:100%;background:var(--good);}
  .paysub{font-size:10.5px;color:var(--helper);margin-top:2px;}
  /* tabs */
  .tabs{position:relative;display:flex;align-items:center;gap:26px;padding:0 22px;border-bottom:1px solid var(--line);}
  .tab{background:none;border:none;padding:11px 0;font-size:14px;color:var(--helper);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:inline-flex;align-items:center;gap:7px;transition:color .16s ease;}
  .tab.active{color:var(--ink);font-weight:600;}
  .tab-underline{position:absolute;left:0;bottom:-1px;width:0;height:2px;background:var(--ink);border-radius:2px;transition:transform .3s cubic-bezier(.4,0,.2,1),width .3s cubic-bezier(.4,0,.2,1);}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.35)}}
  .tab-dot{width:8px;height:8px;border-radius:50%;background:var(--critical);flex:0 0 8px;animation:pulse 1.8s ease-in-out infinite;}
  /* panel */
  .panel{padding:16px 22px 48px;}
  /* sticky action count strip */
  .action-strip{display:flex;align-items:center;gap:10px;padding:9px 0 9px;border-bottom:1px solid var(--line);margin-bottom:18px;position:sticky;top:0;background:#fff;z-index:10;}
  .action-strip .as-count{font-size:13px;font-weight:700;color:var(--ink);flex:1;}
  .action-strip .as-count span{color:var(--blue);}
  /* ===== Paused-agent overlay over the Actions tab ===== */
  .actions-wrap{position:relative;max-width:1000px;}
  .actions-wrap.is-paused{min-height:440px;}
  .actions-wrap.is-paused > .action-strip,
  .actions-wrap.is-paused > .tl-head,
  .actions-wrap.is-paused > .tl,
  .actions-wrap.is-paused > .empty{filter:blur(3px);opacity:.45;pointer-events:none;user-select:none;}
  .agent-overlay{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(255,255,255,.62);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);border-radius:12px;animation:overlayIn .3s ease;}
  @keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
  .agent-overlay-inner{max-width:600px;text-align:center;}
  .agent-overlay-btn{padding:12px 26px;font-size:15px;}
  .agent-overlay-btn svg{width:18px;height:18px;}
  /* triggering event card */
  .event-card{border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:0;}
  .event-card-head{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line2);background:var(--soft);}
  .event-card-head .ev-label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--helper);}
  .event-card-head .ev-who{font-size:13.5px;font-weight:700;color:var(--ink);}
  .event-card-head .ev-date{font-size:12px;color:var(--helper);margin-left:auto;}
  .event-card-body{padding:14px 16px;max-height:220px;overflow-y:auto;font-size:13px;line-height:1.6;white-space:pre-wrap;color:#2f302b;}
  /* connector between event and actions */
  .response-bridge{display:flex;align-items:center;gap:10px;padding:14px 0 10px;margin-left:2px;}
  .bridge-line{width:2px;height:28px;background:var(--line);border-radius:2px;flex:0 0 2px;margin-left:14px;}
  .bridge-label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--helper);margin-left:10px;}
  .bridge-count{font-size:11.5px;font-weight:700;color:var(--blue);margin-left:4px;}
  /* ===== Cause → effect (Actions tab) ===== */
  .cause-effect{margin-top:6px;}
  .ce-context{margin-bottom:16px;}
  .ce-context-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--n50);}
  .ce-ctx-icon{width:18px;height:18px;flex:0 0 18px;color:var(--critical);}
  .ce-ctx-icon svg{width:18px;height:18px;}
  .ce-ctx-text{flex:1;font-size:13px;color:var(--ink);}
  .ce-ctx-time{font-size:12px;color:var(--helper);white-space:nowrap;}
  .ce-headers{display:grid;grid-template-columns:minmax(0,1fr) 36px minmax(0,1.35fr);align-items:center;padding:0 2px 8px;}
  .ce-h{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--helper);}
  .ce-row{display:grid;grid-template-columns:minmax(0,1fr) 36px minmax(0,1.35fr);align-items:start;margin-bottom:14px;}
  .ce-arrow{display:flex;align-items:center;justify-content:center;color:var(--n400);padding-top:16px;}
  .ce-arrow svg{width:18px;height:18px;}
  /* left cause card */
  .ce-cause{display:flex;gap:10px;border:1px solid var(--border);border-radius:8px;background:var(--white);padding:12px 13px;}
  .ce-cause.email{cursor:pointer;transition:border-color .12s ease,background .12s ease;}
  .ce-cause.email:hover{border-color:var(--hi-100);background:var(--n50);}
  .ce-cause-icon{width:18px;height:18px;flex:0 0 18px;color:var(--helper);margin-top:1px;}
  .ce-cause-icon svg{width:18px;height:18px;}
  .ce-cause-main{flex:1;min-width:0;}
  .ce-cause-head{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;}
  .ce-cause-who{font-size:13px;font-weight:700;color:var(--ink);}
  .ce-cause-time{font-size:11.5px;color:var(--helper);}
  .ce-cause-text{font-size:12.5px;color:var(--helper);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .ce-cause-link{display:inline-block;margin-top:7px;font-size:12px;font-weight:600;color:var(--blue);}
  .ce-cause-none{color:var(--helper);font-size:12.5px;align-items:center;}
  .ce-col-effect .card{margin-bottom:0;}
  /* ===== Timeline (Actions tab) — event inline, suggested action nested beneath ===== */
  .tl-head{padding:2px 2px 12px;}
  .tl{position:relative;}
  /* One continuous spine for the whole list, not a per-node segment stitched end-to-end —
     stitching relied on each node's own box ending exactly where the next one's dot begins,
     which broke (visibly disjointed) as soon as a node's content height varied. Anchored to
     the first dot's center (top:10px) and the container's own bottom, which lines up with the
     last node's dot since that node has no trailing padding (see :last-child below). */
  .tl::before{content:"";position:absolute;left:6px;top:10px;bottom:0;width:2px;background:var(--line);}
  .tl-node{position:relative;padding-left:30px;padding-bottom:20px;}
  .tl-node:last-child{padding-bottom:0;}
  .tl-dot{position:absolute;left:0;top:3px;width:14px;height:14px;border-radius:50%;background:var(--bg);border:2px solid var(--n300);box-sizing:border-box;z-index:1;}
  .tl-event{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--ink);min-height:20px;}
  .tl-ev-icon{width:16px;height:16px;flex:0 0 16px;color:var(--helper);display:flex;margin-top:2px;}
  .tl-ev-icon.crit{color:var(--critical);}
  .tl-ev-icon svg{width:16px;height:16px;}
  .tl-ev-main{flex:1;min-width:0;}
  .tl-ev-top{display:flex;align-items:center;gap:8px;}
  .tl-ev-who{font-weight:700;flex:0 0 auto;}
  .tl-ev-text{color:var(--helper);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tl-ev-text.strong{color:var(--ink);font-weight:500;}
  .tl-time{color:var(--helper);font-size:12px;white-space:nowrap;flex:0 0 auto;}
  .tl-open{color:var(--blue);font-weight:600;font-size:12px;flex:0 0 auto;}
  .tl-event.email{cursor:pointer;}
  .tl-event.email .tl-ev-top .tl-time{margin-left:auto;}
  /* email preview wraps to 3 lines here instead of hard-truncating at 1 — more of the body
     is readable without opening the thread. */
  .tl-event.email .tl-ev-text{margin-top:3px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;white-space:normal;overflow:hidden;text-overflow:clip;}
  .tl-event.email:hover .tl-ev-who{color:var(--blue);}
  .tl-event.email:hover .tl-open{text-decoration:underline;}
  .tl-action{position:relative;margin-top:11px;}
  .tl-action::before{content:"";position:absolute;left:-24px;top:-11px;width:20px;height:25px;border-left:2px solid var(--line);border-bottom:2px solid var(--line);border-bottom-left-radius:8px;}
  .tl-action .card{margin-bottom:0;border-left:3px solid var(--primary);box-shadow:0 1px 5px rgba(16,24,40,.07);}
  /* ===== Email drawer (right slide-in) ===== */
  .email-scrim{position:fixed;inset:0;background:rgba(20,20,18,.28);z-index:119;opacity:0;pointer-events:none;transition:opacity .2s ease;}
  .email-scrim.open{opacity:1;pointer-events:auto;}
  .email-drawer{position:fixed;top:0;right:0;width:560px;max-width:94vw;height:100vh;background:#fff;transform:translateX(100%);transition:transform .22s ease,box-shadow .22s ease;z-index:120;display:flex;flex-direction:column;overflow:hidden;}
  .email-drawer.open{transform:translateX(0);box-shadow:-6px 0 28px rgba(0,0,0,.18);}
  .ed-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);}
  .ed-subject{flex:1;font-size:15px;font-weight:700;color:var(--ink);}
  .ed-close{width:30px;height:30px;border:none;background:transparent;color:var(--helper);font-size:22px;line-height:1;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .ed-close:hover{background:var(--soft);color:var(--ink);}
  .ed-body{flex:1;overflow-y:auto;padding:0;}
  .ed-meta{padding-bottom:14px;border-bottom:1px solid var(--line2);margin-bottom:14px;}
  .ed-from{font-size:14px;font-weight:700;color:var(--ink);}
  .ed-email{font-weight:400;color:var(--helper);font-size:12.5px;}
  .ed-to{font-size:12.5px;color:var(--helper);margin-top:3px;}
  .ed-text{font-size:13.5px;line-height:1.6;color:#2f302b;white-space:pre-wrap;}
  .ed-attachments{margin-top:16px;display:flex;flex-wrap:wrap;gap:8px;}
  .ed-thread-link{margin-top:18px;}
  /* cards */
  .card{display:flex;border:1px solid var(--line);border-left:2px solid #c4d3f5;border-radius:8px;padding:16px 18px;margin-bottom:12px;background:#fff;}
  .card.done{background:var(--soft);}
  .card .body{flex:1;min-width:0;}
  .card .title{font-weight:700;font-size:14px;margin-right:8px;}
  .card .desc{color:#34352f;font-size:13.5px;}
  .card .meta{margin-top:5px;font-size:12px;color:var(--helper);}
  .card .acts{display:flex;gap:9px;flex:0 0 auto;align-self:center;}
  .card .verdict{font-size:13px;font-weight:600;}
  .card .verdict.ok{color:var(--good);} .card .verdict.no{color:var(--warn);} .card .verdict.approved{color:var(--hi-200);}
  .empty{border:1px dashed var(--line);border-radius:8px;padding:34px;text-align:center;color:var(--helper);}
  /* ===== Buttons — Balance "button" component (pill, 3 variants × states) ===== */
  /* cursor-tracked glow position (registered so it eases toward the cursor) */
  @property --gx{syntax:"<percentage>";inherits:true;initial-value:50%;}
  @property --gy{syntax:"<percentage>";inherits:true;initial-value:50%;}
  /* base = SECONDARY (white pill + border) */
  /* default = "fourth" button: white bg, moss border, moss-tint hover */
  .btn{position:relative;z-index:0;display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--tertiary);background:var(--white);border-radius:6px;padding:8px 16px;font-size:13.5px;font-weight:500;line-height:1.1;cursor:pointer;color:var(--ink);white-space:nowrap;transition:background-color .12s ease,border-color .12s ease,color .12s ease;}
  .btn::before{display:none!important;}
  .btn .ic{width:15px;height:15px;}
  /* the glow: sits above the button's own fill (z-index:-1) but below the label; fades in + follows cursor */
  .btn::before{content:"";position:absolute;inset:0;z-index:-1;border-radius:inherit;pointer-events:none;opacity:0;background:radial-gradient(150px circle at var(--gx) var(--gy),var(--btn-glow),transparent 72%);transition:opacity .45s ease,--gx .2s ease-out,--gy .2s ease-out;}
  .btn:hover::before{opacity:1;}
  .btn:hover{background:#e7e9de;border-color:#e7e9de;}
  .btn:focus-visible{outline:none;box-shadow:0 0 0 2px var(--white),0 0 0 3.5px var(--hi-200);}
  /* PRIMARY (default variant) — brand navy pill; subtle cyan glow tracks the cursor */
  /* primary = "tertiary" sage button (team default across screens) */
  .btn-primary{background:var(--tertiary);border-color:var(--tertiary);color:var(--ink);}
  .btn-primary:hover{background:var(--tertiary-hover);border-color:var(--tertiary-hover);}
  .btn-primary:focus-visible{outline:none;box-shadow:0 0 0 2px var(--white),0 0 0 3.5px var(--n400);}
  /* DESTRUCTIVE (red/highlighted, secondary) — white pill, red text; red wash tracks cursor */
  .btn-danger{background:var(--white);color:var(--critical);border-color:var(--border);--btn-glow:rgba(200,30,30,.16);}
  .btn-danger:hover{border-color:var(--critical);}
  /* TERTIARY — text only (no fill/border/glow); text turns blue on hover, ring on focus */
  .btn-tertiary{background:transparent;border-color:transparent;color:var(--ink);padding:8px 12px;}
  .btn-tertiary::before{display:none;}
  .btn-tertiary:hover{background:transparent;border-color:transparent;color:var(--blue);}
  .btn-tertiary:focus-visible{outline:none;box-shadow:0 0 0 2px var(--white),0 0 0 3.5px var(--hi-200);}
  @media (prefers-reduced-motion:reduce){.btn::before{transition:opacity .2s ease;}}
  /* large size */
  .btn-lg{padding:11px 22px;font-size:14px;}
  /* agent summary */
  /* page-level action bar */
  .action-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .action-bar .sp{flex:1;}
  /* page-level affordance buttons — top right of crumb */
  .top-actions{display:flex;align-items:center;gap:8px;margin-left:auto;}
  /* icon button (flag) — circular, Balance subtle */
  .btn-icon{border:1px solid transparent;background:none;cursor:pointer;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;color:var(--helper);position:relative;transition:background .12s ease,color .12s ease,border-color .12s ease;}
  .btn-icon svg{width:17px;height:17px;}
  .btn-icon:hover{background:var(--n50);border-color:var(--border);color:var(--ink);}
  .btn-icon.flagged{color:var(--critical);}
  .icon-tip{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--ink);color:#fff;font-size:11.5px;font-weight:500;white-space:nowrap;padding:5px 10px;border-radius:7px;pointer-events:none;z-index:30;box-shadow:0 4px 14px rgba(0,0,0,.18);}
  .btn-icon:hover .icon-tip,.btn-topbar:hover .icon-tip{display:block;}
  /* Small "why" prompt on flag/unflag — deliberately not a full modal, just a compact popover
     anchored under the flag button, matching the app's other dropdown popovers. */
  .flag-popover{position:absolute;top:calc(100% + 6px);left:0;z-index:31;width:230px;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);padding:10px;}
  .flag-popover-label{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;}
  .flag-popover-input{width:100%;resize:none;border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12.5px;font-family:inherit;color:var(--ink);outline:none;}
  .flag-popover-input:focus{border-color:var(--hi-100);}
  .flag-popover-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:8px;}
  .flag-popover-actions .btn{padding:5px 12px;font-size:12.5px;}
  /* topbar action = secondary pill (matches .btn) */
  .btn-topbar{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--white);border-radius:6px;padding:7px 14px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--ink);position:relative;transition:border-color .12s ease,background .12s ease,color .12s ease;}
  .btn-topbar svg{width:14px;height:14px;}
  .btn-topbar:hover{border-color:var(--n400);background:var(--n50);}
  .btn-topbar.paused{border-color:var(--warn);color:var(--warn);background:var(--critical-surface);}
  .btn-topbar.paused:hover{background:var(--critical-surface);border-color:var(--warn);}
  /* ===== Toretto top banner (sage header with breadcrumb + global search) ===== */
  .main{overflow-y:auto;}
  .topbar{position:sticky;top:0;z-index:40;margin-left:-18px;min-height:56px;display:flex;align-items:center;gap:14px;padding:8px 16px;background:var(--header);overflow:hidden;}
  .topbar::after{content:"";position:absolute;top:0;bottom:0;right:0;width:340px;background:#fff;opacity:.25;pointer-events:none;clip-path:polygon(70% 0,100% 0,100% 100%,50% 100%);z-index:0;}
  .topbar>*{position:relative;z-index:1;}
  .tb-crumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--n700);font-weight:500;min-width:0;}
  .tb-crumb b{color:var(--ink);font-weight:700;}
  .tb-crumb .tb-sep{color:var(--n400);}
  .tb-crumb .tb-link{color:var(--n700);cursor:pointer;}
  .tb-crumb .tb-link:hover{color:var(--ink);text-decoration:underline;}
  .tb-spacer{flex:1;}
  .tb-search{display:flex;align-items:center;gap:9px;width:330px;max-width:30vw;background:rgba(243,243,242,.75);border:1px solid var(--n300);border-radius:6px;padding:7px 11px;color:var(--n500);font-size:13px;cursor:text;}
  .tb-search:hover{background:var(--n50);border-color:var(--n400);}
  .tb-search svg{width:15px;height:15px;flex:0 0 15px;color:var(--n500);}
  .tb-search .tb-ph{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tb-search .tb-kbd{font-size:10px;color:#fff;background:var(--black);border-radius:5px;padding:2px 6px;font-weight:500;}
  .tb-help{width:30px;height:30px;flex:0 0 30px;border-radius:50%;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;color:var(--n500);font-size:14px;font-weight:600;}
  /* ===== accent (jolly blue) pills use white foreground ===== */
  .nav-badge{color:#fff;}
  .as-ask,.as-ask .as-ask-ic{color:var(--ink);}
  .chat-send,.chat-head-icon{color:#fff;}
  .agent-clip{color:var(--ink);}
  .chat-msg.user{color:#fff;}
  /* permissions text link */
  .perms-link{font-size:12.5px;font-weight:600;color:var(--helper);cursor:pointer;}
  .perms-link:hover{color:var(--blue);}
  .agent-summary{position:relative;overflow:hidden;background:var(--info-surface);border:1px solid rgba(36,118,216,.22);border-radius:6px;padding:16px 18px 14px;}
  .agent-summary .as-label{color:var(--hi-200);margin-bottom:11px;display:flex;align-items:center;}
  .agent-summary .as-body{font-size:13px;line-height:1.6;color:var(--ink);}
  .agent-summary .as-body strong{font-weight:700;}
  .as-bullets{margin:0;padding:0;list-style:none;color:var(--ink);}
  .as-bullets li{margin-bottom:12px;} .as-bullets li:last-child{margin-bottom:0;}
  .as-slot{display:block;font-family:"Geist Mono",ui-monospace,SFMono-Regular,monospace;font-size:9.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--helper);opacity:.75;margin-bottom:3px;}
  .as-line{display:block;}
  .as-ask{margin-top:14px;display:inline-flex;align-items:center;gap:7px;border:1px solid var(--tertiary);background:var(--tertiary);color:var(--ink);border-radius:6px;padding:8px 15px;font-size:13px;font-weight:500;cursor:pointer;transition:background-color .12s ease,border-color .12s ease;}
  .as-ask .as-ask-ic{width:15px;height:15px;display:flex;}
  .as-ask .as-ask-ic svg{width:15px;height:15px;}
  .as-ask:hover{background:var(--tertiary-hover);border-color:var(--tertiary-hover);}
  /* attachment chip */
  .attach-chip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--helper);background:var(--soft);border:1px solid var(--line);border-radius:5px;padding:2px 7px;margin-left:6px;cursor:pointer;}
  .attach-chip:hover{background:var(--n100);color:var(--ink);border-color:var(--n300);}
  /* email thread expand */
  .thread{margin-top:14px;padding-top:13px;border-top:1px solid var(--line);}
  .thread-header{font-size:12px;font-weight:600;color:var(--helper);margin-bottom:12px;}
  .thread-more{font-size:12.5px;color:var(--blue);cursor:pointer;margin-bottom:8px;display:inline-block;}
  .email-earlier{padding:9px 13px;border-radius:7px;margin-bottom:6px;background:#f8f8f6;border:1px solid var(--line2);font-size:12.5px;}
  .email-earlier .em-who{font-weight:600;color:var(--ink);}
  .email-earlier .em-meta{color:var(--helper);font-size:11.5px;margin-left:6px;}
  .email-earlier .em-body{color:#54554d;margin-top:4px;white-space:pre-wrap;line-height:1.45;}
  .email-open{padding:13px 14px;border-radius:8px;margin-bottom:10px;background:#fff;border:1px solid var(--line);}
  .email-open .em-who{font-weight:700;font-size:14px;}
  .email-open .em-meta{font-size:12px;color:var(--helper);margin-top:2px;}
  .email-open .em-body{margin-top:10px;font-size:13px;line-height:1.55;white-space:pre-wrap;}
  .draft-box{border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-top:4px;}
  .draft-box .db-head{background:var(--soft);padding:10px 14px;font-size:12px;color:var(--helper);border-bottom:1px solid var(--line2);}
  .draft-box .db-head strong{color:var(--ink);}
  .draft-box textarea{width:100%;border:none;padding:12px 14px;font-size:13px;font-family:inherit;line-height:1.55;resize:vertical;background:#fff;min-height:120px;outline:none;}
  .draft-box .db-foot{padding:10px 14px;border-top:1px solid var(--line2);background:#fff;display:flex;justify-content:flex-end;gap:9px;}
  /* activity — email rows (cards) + event timeline; everything opens in the drawer */
  /* Continuous timeline rail runs behind the whole list. Email cards are full-width and sit
     ON TOP of the rail (opaque, no node of their own — their mail icon occupies the gutter);
     the rail only shows through the transparent event rows, connecting their nodes. Email
     body text is inset to 36px so it lines up with the event-row text. */
  .act-filter-tabs{display:flex;gap:6px;margin:2px 0 14px;}
  .act-ftab{border:1px solid var(--line);background:#fff;color:var(--helper);border-radius:20px;padding:5px 14px;font-size:12.5px;font-weight:500;cursor:pointer;}
  .act-ftab:hover{background:var(--soft);}
  .act-ftab.active{background:var(--ink);border-color:var(--ink);color:#fff;}
  .act-list{position:relative;width:100%;}
  .act-list::before{content:"";position:absolute;left:15px;top:10px;bottom:10px;width:2px;background:var(--n200);}
  .act-row.email-row{position:relative;z-index:1;display:flex;gap:12px;align-items:flex-start;cursor:pointer;background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px 14px 12px 0;margin:10px 0 16px;transition:border-color .12s ease,box-shadow .12s ease;}
  .act-row.email-row.has-thread-link{padding-bottom:28px;}
  .act-row.email-row:hover{border-color:var(--hi-100);box-shadow:0 1px 4px rgba(16,24,40,.06);}
  /* 32px icon slot (matches the event node width) with the 18px glyph centered, so the email
     mail icon lines up on the same vertical column as the timeline event icons. */
  .er-icon{width:32px;flex:0 0 32px;display:flex;justify-content:center;color:var(--helper);margin-top:1px;}
  .er-icon svg{width:18px;height:18px;}
  .er-main{flex:1;min-width:0;}
  .email-row-top{display:flex;align-items:center;gap:8px;}
  .email-row-who{font-size:13.5px;font-weight:700;flex-shrink:0;}
  /* thread subject — its own tone (lighter than the body preview's --helper) plus italic, so
     sender / subject / body preview all read as three distinct things at a glance. */
  .email-row-subject{flex:1;min-width:0;font-size:12px;font-weight:400;font-style:italic;color:var(--n400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .email-row-date{font-size:11.5px;color:var(--helper);margin-left:auto;white-space:nowrap;}
  .email-row-body{font-size:13px;color:var(--helper);margin-top:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .email-row-foot{display:flex;align-items:center;gap:6px;margin-top:6px;}
  /* stacked box indicating a multi-message thread */
  .email-stack{position:absolute;right:14px;bottom:11px;font-size:11.5px;font-weight:600;color:var(--blue);cursor:pointer;background:none;border:none;box-shadow:none;padding:0;margin:0;}
  .email-stack:hover{text-decoration:underline;}
  .act-body{max-width:1000px;}
  /* event rows sit directly on the continuous .act-list rail — solid actor-colored node
     with a white halo so it reads cleanly over the line. */
  .act-row.event-row{display:flex;align-items:center;gap:12px;position:relative;padding:14px 0 14px 44px;}
  /* icon node: a tinted circle holding a Lucide glyph for the event kind, actor-colored,
     centered on the rail (which it masks). */
  .ev-node{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:var(--hi-200);z-index:1;}
  .ar-body{flex:1;min-width:0;font-size:13px;color:var(--ink);}
  .ar-datestamp{flex:0 0 auto;text-align:right;font-size:11.5px;color:var(--helper);white-space:nowrap;}
  /* thread drawer — Gmail-style stacked messages */
  .ed-count{font-size:12px;font-weight:400;color:var(--helper);}
  /* Gmail-style thread: full-width rows separated by hairlines, no per-message boxes. */
  .td-msg{border:none;border-radius:0;margin:0;border-bottom:1px solid var(--line);}
  .td-msg:last-of-type{border-bottom:none;}
  .td-msg.collapsed{display:flex;align-items:center;gap:11px;padding:11px 18px;cursor:pointer;background:transparent;}
  .td-msg.collapsed:hover{background:var(--soft);}
  .td-who{font-weight:700;flex:0 0 auto;font-size:13.5px;color:var(--ink);}
  .td-who-email{font-weight:400;color:var(--helper);font-size:12.5px;}
  .td-msg.collapsed .td-pre{flex:1;min-width:0;color:var(--helper);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;}
  .td-date{color:var(--helper);font-size:12px;white-space:nowrap;}
  .td-msg.open{background:transparent;padding:16px 18px;}
  .td-msg-head{display:flex;align-items:flex-start;gap:11px;cursor:pointer;}
  .td-msg-meta{flex:1;min-width:0;}
  .td-msg-line1{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  .td-msg-to{font-size:12px;color:var(--helper);margin-top:1px;}
  .td-msg-body{font-size:13.5px;line-height:1.6;color:#2f302b;white-space:pre-wrap;margin-top:12px;}
  .td-msg-badges{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;}
  .td-connector{width:2px;height:18px;background:var(--n200);margin:2px 0 2px 32px;}
  /* ===== Per-recipient delivery & engagement (inline expand/collapse, no container) ===== */
  .delivery-block{margin-top:11px;border-top:1px solid var(--line2);padding-top:9px;}
  .dr-toggle{display:flex;align-items:center;gap:7px;width:100%;border:none;background:transparent;cursor:pointer;padding:2px 0;font-family:inherit;text-align:left;}
  .dr-chev{display:flex;width:14px;height:14px;color:var(--helper);transition:transform .18s ease;}
  .dr-chev svg{width:14px;height:14px;}
  .dr-chev.open{transform:rotate(180deg);}
  .dr-summary{font-size:12.5px;font-weight:600;color:var(--helper);}
  .dr-toggle:hover .dr-summary{color:var(--ink);}
  .dr-bounce-count{color:var(--critical);}
  .dr-detail{padding:2px 0 0;}
  .dr-section{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--n500);margin:14px 0 7px;}
  .dr-recip{padding:7px 0 9px;border-top:1px solid var(--line2);}
  .dr-section + .dr-recip{border-top:none;padding-top:0;}
  .dr-email{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px;user-select:text;}
  .dr-line{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12.5px;}
  .dr-line .dr-ic{display:flex;width:15px;height:15px;flex:0 0 15px;}
  .dr-line .dr-ic svg{width:15px;height:15px;}
  .dr-line .dr-label{flex:1;}
  .dr-line .dr-ts{color:var(--helper);font-size:12px;white-space:nowrap;user-select:text;}
  .dr-line.on{color:var(--good);}
  .dr-line.on .dr-label{font-weight:600;}
  .dr-line.off{color:var(--n400);}
  .dr-line.off .dr-ts{color:var(--n400);}
  .dr-bounced{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--critical);background:var(--critical-surface);border:1px solid #f3c2c2;border-radius:6px;padding:4px 9px;}
  .dr-bounced .ic{display:flex;width:14px;height:14px;}
  .dr-bounced .ic svg{width:14px;height:14px;}
  .td-draft{border:1px solid #cfe0fa;border-radius:10px;padding:14px 16px;background:var(--info-surface);margin:0 18px 18px;}
  .td-draft.editing{background:#fff;}
  .td-draft.editing .composer{margin-top:8px;}
  .td-draft.editing .cmp-body{min-height:150px;}
  .td-draft-head{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
  .td-draft-name{font-weight:700;font-size:13.5px;}
  .td-draft-tag{font-size:11.5px;color:var(--helper);font-style:italic;}
  .td-draft-body{font-size:13.5px;line-height:1.6;color:#2f302b;white-space:pre-wrap;}
  .td-draft-foot{display:flex;gap:9px;margin-top:12px;}
  /* ===== UNIFIED EMAIL CARD ===== */
  .em-card{border:1px solid var(--line);border-radius:8px;margin-bottom:12px;overflow:hidden;background:#fff;}
  /* email card header — always visible */
  .em-card-head{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 16px 10px;cursor:pointer;}
  .em-card-head:hover{background:#fafafa;}
  .em-head-left{flex:1;min-width:0;}
  .em-name-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
  .em-name{font-size:14px;font-weight:700;}
  .em-to-summary{font-size:12.5px;color:var(--helper);display:flex;align-items:center;gap:4px;}
  .em-to-summary .to-names{color:var(--helper);}
  .em-chevron{font-size:10px;color:var(--helper);cursor:pointer;padding:1px 4px;border-radius:3px;border:1px solid var(--line2);line-height:1.4;}
  .em-chevron:hover{background:var(--soft);}
  .em-date{font-size:12px;color:var(--helper);white-space:nowrap;margin-left:16px;}
  /* expanded header dropdown */
  .em-header-detail{padding:10px 16px 12px;border-top:1px solid var(--line2);background:#fafafa;font-size:12.5px;}
  .em-header-grid{display:grid;grid-template-columns:60px 1fr;gap:4px 10px;margin-bottom:12px;color:var(--helper);}
  .em-header-grid .hg-label{text-align:right;font-weight:600;}
  .em-header-grid .hg-val{color:var(--ink);}
  /* engagement grid */
  .eng-grid{border-top:1px solid var(--line2);padding-top:10px;margin-top:4px;}
  .eng-grid table{width:100%;border-collapse:collapse;font-size:11.5px;}
  .eng-grid th{text-align:center;font-weight:700;color:var(--helper);padding:3px 6px;border-bottom:1px solid var(--line2);}
  .eng-grid th.left{text-align:left;}
  .eng-grid td{text-align:center;padding:4px 6px;color:var(--helper);}
  .eng-grid td.left{text-align:left;color:var(--ink);font-weight:600;}
  .eng-yes{color:var(--ink);font-weight:700;}
  .eng-no{color:var(--line);}
  /* email body */
  .em-card-body{padding:4px 16px 14px;font-size:13.5px;line-height:1.65;white-space:pre-wrap;color:#2f302b;}
  .em-card-attach{padding:0 16px 14px;display:flex;gap:8px;flex-wrap:wrap;}
  .em-card-footer{padding:8px 16px 12px;border-top:1px solid var(--line2);}
  /* collapsed email in thread (numbered) */
  .em-collapsed{display:flex;align-items:center;gap:12px;padding:9px 16px;cursor:pointer;border-bottom:1px solid var(--line2);background:#f5f5f3;}
  .em-collapsed:hover{background:#efefec;}
  .em-collapsed .ec-who{color:var(--helper);}
  .em-collapsed .ec-pre,.em-collapsed .ec-date{color:#b4b5ae;}
  /* grey for expanded emails in thread view — not the agent draft */
  .thread-view .em-card:not(.thread-draft){background:#f5f5f3;}
  .thread-view .em-card:not(.thread-draft) .em-card-head:hover{background:#efefec;}
  .em-num{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;border-radius:8px;background:#e4e4e0;font-size:11px;font-weight:700;color:var(--helper);padding:0 6px;}
  .em-collapsed .ec-who{font-size:13px;font-weight:600;}
  .em-collapsed .ec-pre{flex:1;min-width:0;font-size:12.5px;color:var(--helper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:4px;}
  .em-collapsed .ec-date{font-size:11.5px;color:var(--helper);}
  /* thread back button */
  .thread-back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--helper);cursor:pointer;border:1px solid var(--line);border-radius:7px;padding:6px 12px;margin-bottom:18px;background:#fff;}
  .thread-back-btn:hover{background:var(--soft);}
  /* agent draft indicator on activity list */
  .draft-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:1px 6px;border:1px solid var(--line);border-radius:4px;color:var(--ink);margin-left:6px;vertical-align:middle;}
  /* ===== AGENT ACTIONS PANEL ===== */
  /* "What happened" — bordered read-only digest zone */
  .new-events-zone{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:14px 16px 10px;margin-bottom:0;}
  .wh-label{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--helper);margin-bottom:12px;}
  /* connector stub between "What happened" box and "Agent Proposes" divider */
  .zone-connector{width:1px;height:24px;background:var(--line);margin:0 auto;}
  .re-timeline{position:relative;padding-left:22px;}
  .re-timeline::before{content:"";position:absolute;left:7px;top:0;bottom:0;width:1px;background:var(--line2);}
  /* email entries in related events */
  .re-card{background:#fff;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer;position:relative;}
  .re-card::before{content:"";position:absolute;left:-15px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:var(--soft);border:1.5px solid #b8b9b3;z-index:1;}
  .re-card:hover{background:#efefec;}
  .re-card-top{display:flex;align-items:center;gap:10px;padding:10px 14px;}
  .re-card-who{font-size:13px;font-weight:700;flex:1;}
  .re-card-date{font-size:11.5px;color:var(--helper);}
  .re-card-preview{font-size:12.5px;color:var(--helper);padding:0 14px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .re-card-body{padding:10px 14px 12px;font-size:13px;color:#2f302b;line-height:1.55;white-space:pre-wrap;border-top:1px solid var(--line2);}
  /* non-email event rows */
  .re-event-row{display:flex;align-items:center;gap:10px;padding:7px 0;margin-bottom:4px;position:relative;}
  .re-event-text{flex:1;font-size:13px;color:var(--ink);}
  .re-event-stamp{font-size:11.5px;color:var(--helper);text-align:right;white-space:nowrap;}
  /* proposal divider — clear boundary between digest and active proposals */
  .proposal-divider{display:flex;align-items:center;gap:12px;margin:0 0 16px;}
  .proposal-divider::before,.proposal-divider::after{content:"";flex:1;height:1px;background:var(--line);}
  .proposal-divider .pd-label{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;}
  .proposal-divider .pd-count{color:var(--blue);}
  .proposal-label{font-size:10px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--helper);margin-bottom:12px;}

  /* ===== SEND EMAIL CARD ===== */
  /* collapsed bird's-eye */
  .se-collapsed{display:flex;align-items:center;gap:16px;}
  .se-meta{font-size:12.5px;color:var(--helper);margin-left:4px;}
  .se-edit{font-size:12px;color:var(--helper);cursor:pointer;padding:3px 8px;border:1px solid var(--line);border-radius:5px;background:#fff;white-space:nowrap;}
  .se-edit:hover{background:var(--soft);}
  /* expanded editor */
  .draft-editor{border-top:1px solid var(--line2);margin-top:14px;padding-top:12px;}
  .draft-thread-link{font-size:12.5px;color:var(--blue);cursor:pointer;text-decoration:underline;display:inline-block;margin-bottom:12px;}
  /* recipient pill fields */
  .recip-field{display:flex;align-items:center;flex-wrap:wrap;gap:5px;padding:6px 0;border-bottom:1px solid var(--line2);min-height:32px;}
  .recip-label{flex:0 0 28px;font-size:12px;font-weight:600;color:var(--helper);}
  .email-pill{display:inline-flex;align-items:center;gap:4px;background:#e8e8e4;border-radius:8px;padding:2px 10px 2px 10px;font-size:12.5px;color:var(--ink);}
  .email-pill .ep-rm{color:#9a9a95;cursor:pointer;font-size:11px;margin-left:2px;}
  .recip-input{border:none;outline:none;font-size:13px;font-family:inherit;min-width:80px;background:transparent;color:var(--ink);}
  /* body */
  .draft-body-area{width:100%;border:none;border-bottom:1px solid var(--line2);padding:10px 0;font-size:13px;font-family:inherit;line-height:1.6;resize:none;min-height:192px;outline:none;background:transparent;margin-top:6px;}
  .draft-tiny{display:flex;gap:12px;font-size:12px;color:var(--helper);justify-content:flex-end;padding:5px 0;}
  .draft-tiny span{cursor:pointer;} .draft-tiny span:hover{color:var(--ink);}
  /* attachment row */
  .attach-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 0;}
  .attach-pill-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 9px;border:1px solid var(--line);border-radius:5px;color:var(--ink);cursor:pointer;}
  .attach-pill-tag:hover{background:var(--soft);}
  .attach-pill-tag .ap-rm{color:var(--helper);font-size:10px;}
  .attach-add-btn{font-size:12.5px;color:var(--helper);cursor:pointer;padding:3px 8px;border:1px solid var(--line);border-radius:5px;}
  .attach-add-btn:hover{color:var(--ink);}
  .attach-picker{position:absolute;z-index:20;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.1);padding:4px 0;min-width:200px;font-size:13px;margin-top:4px;}
  .attach-picker-item{padding:8px 14px;cursor:pointer;}
  .attach-picker-item:hover{background:var(--soft);}
  /* footer */
  .draft-footer{display:flex;justify-content:flex-end;gap:9px;padding-top:10px;border-top:1px solid var(--line2);margin-top:4px;}
  /* engagement badges — one system shared by the Activity list and the drawer delivery
     report: positive (opened/clicked/delivered) green, negative (bounced/failed) red. */
  .eng-badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:2px 7px 2px 5px;border-radius:5px;}
  .eng-badge .eb-ic{display:flex;width:12px;height:12px;flex:0 0 12px;}
  .eng-badge .eb-ic svg{width:12px;height:12px;}
  .eng-badge.pos{background:var(--positive-surface);color:var(--positive);}
  .eng-badge.neg{background:var(--critical-surface);color:var(--critical);}
  /* full-width thread view */
  .thread-view{width:100%;}
  .thread-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--blue);cursor:pointer;margin-bottom:16px;}
  .thread-back:hover{opacity:.8;}
  .thread-subject{font-size:16px;font-weight:700;margin-bottom:16px;}
  .t-email{border:1px solid var(--line);border-radius:8px;margin-bottom:12px;overflow:hidden;}
  .t-email .te-head{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 16px 10px;}
  .t-email .te-from{font-size:14px;font-weight:700;}
  .t-email .te-addr{font-size:12px;color:var(--helper);margin-top:2px;}
  .t-email .te-meta{font-size:12px;color:var(--helper);margin-top:4px;line-height:1.6;}
  .t-email .te-date{font-size:12px;color:var(--helper);white-space:nowrap;}
  .t-email .te-body{padding:0 16px 14px;font-size:13.5px;line-height:1.65;white-space:pre-wrap;color:#2f302b;}
  .t-email .te-attach{padding:0 16px 14px;display:flex;gap:8px;flex-wrap:wrap;}
  .attach-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border:1px solid var(--line);border-radius:6px;color:var(--helper);cursor:pointer;}
  .attach-pill:hover{background:var(--soft);}
  .ent-strip{display:inline-flex;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:4px;background:#ebebea;color:#54554d;}
  .reply-box{border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:8px;}
  .reply-box textarea{width:100%;border:none;padding:12px 14px;font-size:13px;font-family:inherit;line-height:1.55;resize:vertical;min-height:88px;outline:none;}
  .reply-box .rb-foot{padding:10px 14px;border-top:1px solid var(--line2);display:flex;justify-content:space-between;align-items:center;}
  .rb-hint{font-size:11.5px;color:var(--helper);}
  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(20,20,18,.4);display:flex;align-items:center;justify-content:center;z-index:50;}
  .modal{background:#fff;border-radius:8px;max-width:440px;width:90%;padding:22px;box-shadow:0 12px 40px rgba(0,0,0,.25);}
  .modal h3{margin:0 0 10px;font-size:17px;}
  .modal p{margin:0 0 8px;font-size:13.5px;color:#34352f;line-height:1.5;}
  .modal .row{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;}
  /* ===== Form fields (label on top, gray border, 8px) ===== */
  .field{margin-bottom:12px;}
  .field-label{display:block;font-size:12px;font-weight:600;color:var(--ink);margin-bottom:5px;}
  .field-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;outline:none;color:var(--ink);background:#fff;}
  .field-input:focus{border-color:var(--hi-100);box-shadow:0 0 0 3px rgba(96,197,217,.15);}
  .field-input::placeholder{color:var(--n400);}
  /* ===== Composer (email draft editor) ===== */
  .composer{margin-top:12px;}
  .cmp-threadlink{display:inline-block;margin-bottom:12px;font-size:12.5px;font-weight:600;color:var(--blue);cursor:pointer;}
  .cmp-threadlink:hover{text-decoration:underline;}
  .cmp-field{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
  .cmp-label{flex:0 0 54px;font-size:12px;font-weight:600;color:var(--helper);padding-top:9px;}
  .cmp-control{flex:1;min-width:0;border:1px solid var(--border);border-radius:8px;padding:6px 8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:36px;}
  .cmp-control:focus-within{border-color:var(--hi-100);box-shadow:0 0 0 3px rgba(96,197,217,.15);}
  .recip-input{border:none;outline:none;font-size:13px;font-family:inherit;min-width:90px;flex:1;background:transparent;color:var(--ink);}
  .email-pill{display:inline-flex;align-items:center;gap:6px;background:var(--n100);border-radius:6px;padding:3px 8px;font-size:12.5px;color:var(--ink);}
  .email-pill .ep-rm{color:var(--n400);cursor:pointer;font-size:13px;line-height:1;}
  .email-pill .ep-rm:hover{color:var(--critical);}
  .cmp-editor{border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .cmp-editor:focus-within{border-color:var(--hi-100);}
  .cmp-body{width:100%;border:none;outline:none;padding:12px;font-size:13px;font-family:inherit;line-height:1.6;resize:vertical;min-height:168px;background:transparent;color:var(--ink);}
  .cmp-editor{position:relative;}
  .cmp-tiny{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;}
  .cmp-tiny .btn{padding:6px 14px;font-size:12.5px;}
  /* ===== Design-system type: Geist Mono titles (12/20, all-caps) + mono numbers ===== */
  .as-label,.agent-summary .as-label,.inv-h,.ce-h,.tl-h,.stat-toplabel,.ev-label,.wh-label,.bridge-label{font-family:"Geist Mono",ui-monospace,SFMono-Regular,monospace;font-size:12px;line-height:20px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;}
  .stat-num,.cell-amt,.overdue-amt,table.inv td.r,.inv-totals,.amt-mono{font-family:"Geist Mono",ui-monospace,SFMono-Regular,monospace;font-feature-settings:"tnum";}
  /* progressive breadcrumb */
  .cr-link{color:var(--blue);cursor:pointer;}
  .cr-link:hover{text-decoration:underline;}
  .cr-muted,.cr-sep{color:var(--helper);}
  .inv-od{color:var(--critical);font-size:12px;}
  .inv-status{margin:0;font-family:"Geist Mono",ui-monospace,SFMono-Regular,monospace;font-size:11px;letter-spacing:.2px;color:var(--n500);}
  .inv-status.overdue{color:var(--critical);}
</style>
</head>
